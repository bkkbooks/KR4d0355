body:
  text: 蒙川遺稿巻二宋劉黻撰行猩猩行肩髮肖人形言語劇機警罝罣不可招幽曠從馳騁胡為所嗜偏遇醪即首肯染指疑含沙浸淫歸酩酊蹀履意欲歡孰知墮深穽鄙哉酣爵人白頭猶未醒畏虎行於菟伏林薄樵者逺斤斧寧甘骨肉飢毋蹈爪牙苦山居聚落消十室九閉户形影自相弔祝神為驅禍獸毒猶可逃急征罄罍鬴董孝子行寳祐甲寅剡孝嘉鄉董道成以父病刲肝粥進隨愈縣聞而給之雖非聖經之孝於不知書者求之亦可言孝嵊有董孝子父病刲其肝肝還猶可刲一念充之難遺體戒毁傷此毁乃為完蕭條邨落區四顧藥餌艱親病日且革不療何由安有父始有身無父身奚存裂肝粥以進果獲急證寛嗟哉古道閴天紀紛夷殘訟讟滓官府縣尹悲溢顏惓惓敦教化各各還根元邑民以孝聞莫喻心所歡大篇述梗概詎侈詞藻繁託之剡山川千古禮義宣吟戍婦吟月色暗還明鄰家砧杵聲有衣難寄逺無衣不闗情氷合長沙渡霜枯細栁營北征人未返鴻雁又南征和趙寺丞憶鶴吟既名仙者物何恙亦沈冥弔月憐孤影埋雲惜瘦形琴中空作操詩外不消銘葉落鳴皋處猶疑昨夜聴三十一歳吟三十一年鴻蕩癯隻影流落長江湄耐寒忍苦還力飢寤寐千古聖賢書有時理到意獨㑹有時慾動心如癡有時目睫交宇宙有時咫尺生藩籬有時開口邈豪傑有時瞑目慙嬰兒堅凝力量在深省但守瀟瀟風雨雞丙辰吟熈寧歳丙辰海内厄安石慶元歳丙辰偽學禁如織寳祐復丙辰衣冠墮荆棘龍蛇數云惡鄭𤣥炳先識諸生不齚舌投荒誠予職鶺鶹號屋頭鼯䑕攪牀側雲集膚已粟日出汗欲赤瘴癘半南州可軒靠神力崇寧間司諫江公望貶南安寓寳界作經藏所寓乃畧同蒼苔共岑寂丙辰自丙辰焚香且讀易五窮吟智學文交與命窮瘴江風雨值衰翁昌黎送别勞三揖何似檀欒一笑中四不吟邵康節大寒風雨暑不出公㑹坐廣醵不赴我奉遺體投遐荒相爾室中胡不懼六無吟蘇東坡食無肉兮出無友居無室兮病無醫冬無炭兮夏無泉祠有坡翁慰我思田家吟少時作舊穀未没新穀登家家擊壤含歡聲慚愧今年雨水足隻雞㪷酒相逢迎豪家征斂縱獰隷單巾大帕如蠻兵索錢沽酒不滿欲大者羅織小者驚穀有揚簸實亦簸鉅斛凸槩謀其贏詎思一粒復一粒盡是農人汗血成四十吟三首四十年來父子情吁嗟今日任飄零雖慚負米供三釜莫悔傾籯教一經飲水西江甘冷味炷香南極祝髙齡白雲縱隔三千里詩禮朝朝似過庭四十年來兄弟情渠渠天理境中行形如鶴瘦困書癖志不蠅營守筆耕庭燎獻箴知聖主臺評飛劾到諸生阿奴抑鬱休嫌拙門戸如氷耐拄撑四十年來朋友情朱絃疏越最希聲閒思白日同天樂每向清宵坐月明世事只隨漚起滅故交不趂木枯榮早知黨禍今如織祇合漁樵老此生五言律詩寄菊廬舅氏文章時不偶髩影想蒼蒼抱劍客千里憶家書數行草萊荒菊圃風雨冷詩堂若問求安策東歸策最長過白沙出郭纔數里片景盡漁家夜靜惟聞犬潮平不見沙寒風欺槿葉淡月讓蘆花世路幾銷歇一翁常施茶題花巖厭聴朝雞唱歸來覓栁栽半山張錦繡一水隔塵埃尋壑疑無路看潮别有臺仙人不可見孤鶴夜深迴淮上翠華南渡後此地獨防秋明月家家淚西風處處愁鼔鼙寒出塞烽火夜分樓征戰何時息長河萬古流訪石門洞洞中誰是主一樹野桃開仙駕青牛去瀑疑碧漢來門閒雲闔闢山好客徘徊已擬歸休日臨溪築釣臺登舟西郭别城友久靜還思動離觴江上斟文章關世道科目壞人心門掩溪雲早舟横野水深清猿不解事應向故山尋賦漁村晚照自許同漁者築廬雲水鄉利名俱是幻鷗鷺亦相忘古塔明秋樹歸舟動夕陽臨流不盡意何必問瀟湘冷泉亭兩峯相對立佛屋住中央有水地偏潔無風心自涼林虛猿應谷人定月歸廊造物餘清供山梔一樹香寄馮賀州鳴鳳起朝陽斯文氣脈昌諫書留北闕詩筆化南荒湖栁生新意岡梅續舊芳相期功行逺何但説龔黄靈巖千巖圍一寺入境便無塵古木猶知己髙崖若正人山靈祛虎跡石髓幻龍身上有通天竅民愁獨未伸大龍湫總是佳山水龍居又不同神明専一壑氣勢壓羣雄派想從天落湫疑與海通髙秋看不厭宴坐雨聲中斗山接待雲水無南北幾人相往還井深應接海石顯為開山佛塔寒流上漁帆夕照間何當脫塵鞅分石伴僧閒和朱運筦郊行扁舟隨處泊山影動清波栁惜春風老花嗔宿雨多野棋驚鶴夢僧磬荅漁歌靈運經行地今年幾度過永春道中呈賈九永春春不㫁桑柘滿林丘雲薄無多雨山清即是秋淺沙寒立鷺小逕晚歸牛不慣同為客逢人問宿頭臘雪八窗唯一色穉子詫天花不稔已多歳無寒能幾家山川増古老宇宙頓奢華凍坐無他事呼松自煮茶東皋天然巖壑怪官況此中閒臺閣人煙上䦨干樹影間引泉歸月沼分菊上秋山咫尺神仙洞聴笙㤀却還滄浪閣為王憲使賦獨得蕭臺趣心清不受塵我多臨水屋誰是濯纓人波渺涵天濶沙渟印月真㤀機有鷗鷺渾不厭相親游長渠石洞六月訪古壑衣巾全似秋多無百年壽能得幾番遊泛酒月流硤聴笙雲滿樓相忘有樵者來往共夷猶遊靈巖天竺俞季淵舒東叟平叟李君美黄達道同遊秋氣飽林壑清曠恱所性山禽不避人野猿亦從命臨流悟世情過刹知民病論交慎勿忘森森古松勁賦頑石坐寄中上人一日復一日坐來空世塵清潭常見月老木不知春室靜佛為證山深石作鄰莫詢門外路風雨暗荆榛哭菊廬舅氏舅甥三十年生别且潸然書落雁來處病深秋到邊故人傷逺道孤子伴歸船定有焚黄日西山松樹阡賦鹿巖賈司理所築懐京臺銅駝無萬里長憶再遊難歳月英雄老山河草木寒夢隨歸雁逺愁賴酒杯寛寂寞先朝事斜陽莫倚䦨趙墳客愁同路入行不盡青松水去成雙瀑山來堅一峰土墳存舊壘木主上新封勿謂尋龍貴蒼姬積在農剡縣呈何視履剡為山水宅中有隠淪居未續戴逵贊閒尋支遁書雲深丹井逺城老古州餘何事頻來往愧看人釣魚寄解性存相望纔咫尺㑹面若登天破屋人多厭空山月獨憐未貧猶有易屢旱却無田時到青松下西風伴鶴眠思弟久客知秋早近湖秋更多以予眠不穏知汝夜難過歳儉山空粟門閒路没莎歸期毋太晚親老髩俱皤寄繆景文髫年聞俊發兩歳喜相過薄俗交游少清談警處多巷深留虎跡樹老集禽窠無計買隣住青銅誰共磨南山龍門山椒誰立石人說有龍居此地終招隠何年定結廬雲封秋嶂老瀑倒夕林虛不似膺門峻為謀恐未疎旱一雨連三月當秋乃亢晴不知老天意何忍悞民生川竭無雲起山涼有月明憂時心欲折空聴海鱓聲牛頭菴次王九山憲使韻有此投閒處羣山遶地圖聲名出朝士笑語樂樵夫招鶴松為主開泉月作模猶嫌居欠僻來往是征途遊太玉峯宋飲氷九曲鄭松巖同游分韻得花字一秋吟不盡才拙媿黄花極目皆成市論心有幾家淡交期白髪清話證丹砂却憶分攜處寒林集暮鴉白石洞片石立雲端羣峯向下看夜壇星斗近秋閣洞天寒泉滴疑傳漏人危怯倚䦨降魔孤劍在却並御書安溪上翁問年知近百傴僂合龜形不理兒孫事惟占水旱星慣醫閒施草貰酒自攜瓶勸世行方便何消念佛經寄朱徳卿世事何拘束清吟秪羨君半牕聴夜雨一雁叫秋雲壁潤琴音濇山寒酒力分何時野堂上重與看騷文出邑出邑欣逢友不知三嶺遥雲深山失樹月上海生潮縣小官租急年荒酒戸銷且尋僧舍泊第一免喧囂西際一徑寒松老因來采茯苓水禽鳴杞澗野鹿臥㯶亭瀑近雲根濕仙遺石井靈守廬青道者不厭客頻經臘月六日見雪一冬長是暖見雪獨精神田野眠方穏湖山認不真衆禽憂失樹孤客喜忘貧只此嚴凝氣中含造化仁暮春寄友春歸無路尋煙水一村深中酒易成癖惜花空用心嫩芻青引犢新樹緑藏禽每念離鄉友經年不寄吟過柘溪得西字晴雨春無定東風忽轉西地肥桑眼大天暖麥鬚齊食頓尋幽所舟行畏惡溪野禽如避客飛上半山啼西湖滄波混碧空楊栁路皆通列岫疑奔馬新橋學跨虹東風香跡滿西日樂聲叢總是游觀者幽人趣不同掃松西原百五日寂寞故松阡挑飯瘞黄土酹觴焚紙錢烟林窺老狖雨島哭蠻鵑舊植亭前桂一年髙一年朱菊山汪眉山㑹宿蕭寺共遊溪上寺因得話詩縁客髩添新雪梅花似去年疎鐘含暮雨古木帶寒烟後㑹知難定分題廢夕眠題吟所為吟新搆屋喧寂一溪分洗竹夜留月開門朝放雲佛藏孤塔見虎嘯别山聞予喜頻來此幽情爾共云仁靜山房為孫君賦一廬含萬象古意在聴琴雖有種𤓰事却無鋤草金山幽馴野鹿樹老帶巢禽自得延生法從渠事養心見東閣大唐詩派逺今復有唐人慎吐氷霜句恐妨天地春閉門惟嗜古養鶴亦甘貧未識孤髙貌梅花想逼真悼許氏柔則青青北山柏蒼蒼南山松屬彼氷雪姿無言意趣同造物何冥冥摧以頭夜風傷心復傷心忍聴風中鐘輓陳太傅由來安澹泊人歎歴官遲兩邑猶思宰諸生共哭師文名如日在心事只天知未竟經綸業傳家有桂枝賦林氏集雲菴雲入此山深余常拄屨行客樵分茗處碑磧半苔侵地僻終招隠池清獨照心順寧皆是道謹勿厭書林别脩門丙辰冬往横浦曉發别脩門湖山霧氣昏百年培正脈今日罪忠言死節闗宗社生還賴聖恩問天天不語願及見親存過富陽是非終有定世路苦多屯山色難留客江湖亦送人牛羊寒日晚桑柘一陽新早悟深矰繳山中合隠淪呈贑守陳千峰先生此行灘最險猶幸拜先生身與天俱逺心惟月共明家書何日到世路幾時平歳晚嗟寥落春風獨滿城别聞益謙大有歳事十分九吾為梅嶺行人皆憂路滑天獨惜霜晴公論無今古忠臣有死生玉溪一杯酒話别若無情二月十五日遊興教寺一僧癯似竹結坐對觀音但見夕陽過不知春事深茗芳留野客樹老集巢禽卓錫泉千古泠然照此心横浦十詠周程三先生書院千載斯文冷先生以道鳴山川師友趣日月弟兄情門靜一松在源深雙浦横兒童游里巷猶喜說周程二忠堂劉忠定公元城先生張文忠公無垢先生斯道今猶古相望百載間孤忠如白日遺像對青山寂寞吾儒事﨑嶇世路艱聖朝仁脈在先後慘生還横浦地與崆峒接中多隠者韜山腰僧寺小水口古榕髙粗石草木瘦細民衣食勞予來無一事吟荇補離騷湛泉境僻逺塵跡湛然風雨林一泉通地脉千古照人心灌菊増花蘤煎茶得味深石渠纔此爾誰向道山尋賢女祠劉氏年及笄父許蔡未幾改適吳及吳卒而父又俾適蔡女曰昔已負蔡今又負吳遂投潭而死至今村名賢女村山崦人家聚路旁賢女祠不移初嫁志寧殞及笄時古木有生意清潭即舊知吾宗女猶爾況復號男兒梅嶺曲江曽鑿險梅嶺到今誇何代移來樹幾人羞此花誅茅新佛屋蓋竹半樵家冷煖分南北誰興世道嗟六祖碓頭功行滿非意祖師名世事春風過禪心夜月明清泉靈石竇老鉢鎮山城冷看梅花笑紛紛事送迎東坡祠何年海上還坐鎮此山川筆硯歸京闕衣冠帶瘴煙一生忠膽在萬古黨名傳吾道多流落西風問老天寳界寺無垢讀書於此雙趺隠然城中惟一寺僧老雪盈頭曽識神仙到仍多諫議游鐘聞香火夕碑隠桂杉秋可惜髙堂上雙趺石不留解太尉墓潛檜肉不可食但增忠義悲焚香臨決日扼腕議和時偃月人何在凌煙草亦知曽聞無垢語刋入墓頭碑思西弟棲棲梅嶺下禁足老僧如白髪雙親淚青燈一紙書譍門猶看汝强飯莫思予何事成乖隔低頭媿荷鋤夜氣夜氣不盈握浩然天地清風行石不動雲走月常明陋巷顏回樂深山大舜耕此心無旦晝萬物自生生次酬吳仙尉張都監游興教寺野寺坐寥閴跫然聞足音四山經雨過六月似秋深燈靜窺飢䑕鐘清悟宿禽元城今已逺共此白雲心元城先生嘗寓居興教寺次酬胡編校癯然同旦過一飯鼔魚音對俗情全懶忘言道亦深斜陽浮野馬明月照栖禽誰續梅花賦相期鐵石心壽胡編校嶺根逢誕日相對意如何直道遭時少清貧得壽多仙茅丹已熟鄰秫味方和休說南冠事窮通付浩歌和康節三詩安分所寓即為鄉蕭蕭竹護房山中觀造化世上任炎涼鷃莫攀鵬大鳬難比鶴長榮枯從墮地全不著商量晨起一日事在寅晨興宜自今天澄萬古氣人醒半生心殘月留僧閣寒煙度石林營營何所得白髮易相尋聴琴何人不愛琴難聴是真聲急雨蓬中過流泉石底鳴憂時身欲瘦歴處夢猶驚擬續昌黎操泠泠寫此情逢臘一歳忽逢臘倚䦨清氣浮雪飛淛山上月照楚江頭家逺易成夢酒慳難散愁讀書果何補自笑不騎牛得弟書我自甘流落翻令汝不眠世嗤伯氏拙家賴阿奴賢地惡煙為瘴書遲日作年何時風雨夕炙火勘新編立春臘月廿四夕冷坐梅花州無夢到金馬有詩迎土牛半生常見肘一歳又從頭形影人相釋先生達理否謝胡編校惠藥醫膝病遂以藥名賦益智莫如愚誰甘遂作非年増思續㫁親老憶當歸起石安吟久防風見客稀前胡古君子松節自相依元夕一來生萬感動是兩番春俗朴少燈火年豐多醉人逺鄉猶有舊明月只如新無奈梅花落相看老樹身寄郭仙尉三千里外人梅下忽逢君共對鴉山月如依雁蕩雲命奇明主棄心白老天聞貰酒非耽飲煩渠禦瘴氛餞張都巡有梅横石澗庾嶺樹還同名更因詩重心常與月通期君堅老節媿我作頽翁此去天風便吹歸館閣中飄零飄零吾道在安處即為家夜雨生蒲葉秋風到蓼花貌添平日瘦學悟少年差白足閒相問蕉溪一供茶偶作四十一年身天南作逐臣病居僧却到淡飯僕猶嗔州淺稀髙木山荒闕伏神退藏還有味所憾逺雙親寺居寺居貧亦樂多被憶家分井脈寒生霧鐘聲逺入雲青松知出處白髮耐耕耘此地民風古如何弄挺聞時戊子歳峒冦偷發閒步出門俱寂寞短褐步東皋語簡反疑傲詩枯亦近騷水輪寒碓急山寨晚烟髙邈矣飛來雁令人賦折刀拜無垢先生祠中興遺此老夢寐亦中原泣血兩朝事披肝一萬言名方登禁掖身已謫南源苦學無寒暑雙趺片石存飲啄飲啄天之分吾何泣逺涂落身近南粤結夢屢西湖僱僕知鄉誼時公在南安鄉里故人率錢僱僕往問訊依僧免屋租新栽窗外竹明月照同癯和題臨賦近南逢劇暑多病客難禁與物甘同靜何人肯見尋望雲生逺夢看月得禪心咫尺西闗路輸君杖履臨輸君杖履臨草徑靜深深野鳥隨晴步鄰鐘荅晚吟飛沈皆有趣窮達付無心對月慳於酒寒泉聊一斟餞别郭帚齋游湘南攀龍扁舟今日去昨夜月添愁詩滿湘波上名髙庾嶺頭友朋千載事今古一般秋石鼓多遺刻君能寄雁不寄雲峯饒安國汝濟千年古松樹樹下兩翁吟語不到時事笑皆非壯心江添明月淨山共白雲深寂寞磚趺在何時重許尋和南澗叔見寄五年風雨别家信憶浮沈獨隠金仙屋誰明鐵漢心粤鄰蠻瘴惡蜀急客憂深此地無黄犬朝朝說寄音和杜老人龍門寺詩題寳界東柱招提有宿緣坐此豁心境風來松寄聲月過竹移影殿依鯉石古井汲龜泉冷究竞定慧門如何日三省賦雲山閣呈貳車萬山列屏障來往一溪雲倚檻古今異望闕南北分地清梅是主天濶鷺成羣唐相經行處勛名更屬君迂拙迂拙全無補區區秪耐勞青燈常獨照白髮不相饒戀闕江雲隔憶家山月髙武夷有餘藁何事注離騷蒙川遺稿巻二
