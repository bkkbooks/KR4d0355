body:
  text: 蒙川遺稿卷一宋劉黻撰古詩太玉洞聽琴無絃不成聲有絃多失真真聲在何所和陶方寸春文操惜已逺孔壇嗟復陳所以桑濮響鄭衛波嬴秦詎知幽谷間乃聞太古淳游魚出春水鳴鶴橫霜晨休羡廣陵祕是雅皆怡神接家書朝朝聽來鴻來鴻一何邈秋往冬又至爾鴻胡來闕凝眸屢東眺飛雲渺天角薄晚雲四低來鴻似微雀習習逺近人尺書墜猶玉亟啓讀平安字字發天樂殷勤謝來鴻相過勿憚數中興更化詩東南天一隅誰起銅駝思雁蕩山之臞匕飯悲黍離矯首中興期儒風昌四維隂霾苦凝沍光景幾逶遲鴟梟騰惡音蛇虺紛剝脂忠憤發夜氣歷歷排姦辭黎明叫閶闔骨鯁蒼旻知陽噓一脈春萬宇同掀眉睿智覺今是廟斷消前非疇昔兩揆賢燭照朋邪欺化絃易新調活著扶危機孽蜮遁妖迹鳴鳯覽德輝聾聵一蘇醒皇運興炎基耿耿忠孝圖炳炳恢復規有志竟成事失機將奚為布帛可禦寒穀粟能療飢盤錯見利器疾病知良醫今日墜悠邈千古羞塗碑悼孫龍坡居士魏鶴山銘其墓世教嗟蕪棘獨立狷者儔寄隱萬卷林不知霜滿頭抗論異端息觀志天爵修一室即著庭聖賢時與酬編摩發雲漢千古藝香留毋云食報邈諸郎稼方收前廡兩學録罷職公堂求經明行修之士充員時蜀人楊時發當其選楊君以賤姓名薦或謂余求之蜀人董闕行越人俞季淵永嘉陳行之咸以為不然余亦自揆焉而記以詩云汲古綆懼絶植德根懼斸繩樞守窮賤旦旦天境續防意如長城視身等良玉禰薦非吾榮臧毁詎吾辱暗漏但勿欺人心勝明燭挽新昌俞夫人俞季海母我與令子交道味見顏色乃知貽教來諄諄及岐嶷世多諛墓文令子序其實範身唯禮間齊家本天則子哀難盡書母德更何極寒風號古林慈烏繞珉刻寄徐子蒼琦洙泗千載孤師友道已寂柯山風雪間古韻響金石豫生眇云晚志苦毛髮赤大道惟一中如渴飢飲食智過愚不及均之失天則虛舟發真機戶庭滿春色印之賢聖言充然乃有得風水不雨五十日一雨生意回詎料雨復癡日日聞震雷中元節倏届巨颷恣喧􅂒故挽水倒流能撼山欲摧掀茅與揚沙境境人號哀餘禾墊西甽大木橫荒垓芝田逮楠溪㕓井歸丘萊飄骸填港滙悲魄棲山隈吁嗟今之人瘥札相轆轠籲天豈耄昏靜闕積乖必致盩養燼終成炲造化一感應豫奪何心哉未聞豳詩官租稅星火催癸丑九月苦雨和宋飲氷韻旱潦苦傷稼景象難休休老農蚤夜祝願見虞與周彌望淚欲滴相對如楚囚蒼天叫不譍空使霜白頭市㕓强喧飾村落多闃幽僂指千載間曽無三兩秋竈冷蛙産釡甕閒埃積芻長此更不已菜色淪荒丘陽精赫隂霾庶寬漆室憂代壽徐意一參政東南仁氣氲堪輿武夷相望鍾真儒考亭西山接伊洛戶庭坦蕩除榛蕪意一先生續正傳剛以直養軻其徒端平御史凜風節歷歷抗疏誅姦諛愛君憂國根性天實與名稱名非沽藝祖所謂社稷臣四海歡呼登政途津梁善類植泰道柱石明堂開逺模丹心炳炳照白髮力扶國是消民愈共期聖祉登嵩華長使廊廟聞都俞黎元翹首望太平願斡聖化還唐虞哭藝堂湯先生天地之性人為貴四體百骸仁義具先生領之皇降初繇稚及耆全故步深居獨觀昭曠原學不師傳能自悟真貧不撓萬境融實行已熟羣闕深衣褒帶山澤癯經史百家羅府庫東南清敘知幾何見謂生賢扶世數申公不召老丘園共惜煙霞早成痼豫嘗北面承至言如立明堂聞大濩是時年方二十三自歎摳趨已云暮詎知窮餓驅逺遊倏忽五年疏杖屨世界剝爛志士稀稽首斯文獨終慕家書一幅來雁山報言先生溘朝露肝腸欲斷聲欲瘖六月悲風起荒圃先生諒與混沌游魂魄聰明還太素生兮無辱死有榮虎護龍居老師墓焦溪茶上猶石磑天下無霏霏吐出焦溪腴龜泉二湛康廬如瓦鼎才跳魚眼珠顧我常苦書腸枯一汲河潤九里餘山精木怪不作魔澆過秦論風生裾幾回喚醒眉山蘇詩句零落樵與漁向非朔洛角植黨焦溪安得聲價俱似聞東觀羅遺逸煩君寄上圖經書東坡竹石東坡先生自海上歸過橫浦戲筆竹石於常樂寺壁突兀蒼老隘視八游不知何年歸冊府今有石刻留郡圃無垢先生志其下筆畫同一遒徑真二妙也坡翁北歸留戲筆數竹離奇生磈石世如有鳯必先知碌碌凡禽誰得識風不聲兮月不影山僧笑我移枯瘠嶺址每苦煙瘴深烟瘴何曽禍忠直天使無垢來此邦要與坡翁發真跡大書特書等傲岸方寸一虛隘八極何年移植蓬萊宫清風逼人寒半壁枝可磨葉可摘石上根祇如昔用韻酬胡編校詩成斷肝腑寄我光焰長貞女守閒寂志士多悲傷煙雲起寒嶼風雨喧夕窗憂時付酒斚惜日惟書牀頥養匪丹汞坤德明黃裳羡君富奇植獨幹難為芳追和淵明貧士詩七首橫浦作貧士何所營但知貧可依日月照不盡朝暮常分暉水瘦魚自躍林寒鳥亦飛紛紛苦多求此境誰同歸石田久不種難免良夜飢飢本士之常獨抱嫠婦悲把書不釋手非志冕與軒昔有董仲舒三載不窺園道味歸肝脾遑恤厨無煙家貧未為貧有書足可研寤寐千載心俗子難與言勿歎師友寂日日親聖賢髙山與流水妙趣歸之琴吾愧學未成匪歎無知音但向胸中㑹毋勞指下尋種菊或可茹得酒聊復斟窮達非所期動靜一以欽發為琴之聲邈矣天地心平生抱狷介深愧唾面婁蒿萊常閉門與世疏應酬奈何世患稔鯁鯁如馬周顛頓亦良苦飢羸非所憂皇路益以榛忍作寒蟬儔口禍渺無際困辱秖自求靜對松竹枝一塵無相干飲酒不至醉讀書匪求官畦瘠多種菊采采亦可餐衣冠背時樣筆硯同歲寒但求聖賢心肯效兒女顏紛紛往來者笑我柴門關人生特寄耳何往非萍蓬世挾智反愚豫謂拙乃工淵明有姱節髙邁疏與龔大抵豪傑士所見自略同簞瓢非遂窮軒冕豈真通倘不達至理冥霧將奚從扁舟溯西江忽抵梅花州二忠儼遺像豫愧非其儔肝膽照氷雪要亦狷者流言直不砭時掇禍貽親憂山禽似相盼來往疑勸酬闃坐生萬感矯首觀前修兀兀棲精廬兀兀棲精廬青山日相對靜照年少非動虞壯士悔耕鋤計已晚畚築力猶耐夜臥司馬衾晨餐魯直菜自計清廟修誰知圜壁壞人情春水波世事寒雲態直道叢百謫孤蹤繞羣吠拘纍僒形骸憂危積肝肺逢人口即瘖出戶足如礙周程儼範模劉張遺謦咳滌垢學歸愚達增務韜晦志苦秋不磨髮白春匪載採菊聊傾觴延蘭可紉佩官餽乏三月家書隔千載楚語欲聽慣峒關驚未潰冥冥瘴霧間坰坰靈光在莫揮感時淚山水怡吾愛和張無垢胡淡菴二先生清江亭記一靜心境融飛躍昭上下大道元不磨人情自榮謝兩翁投遐荒浩然獨餘暇悲此當道狐羞彼立仗馬命義俯仰間誰復論冬夏一笑清江濱瓦杯勝瓊斚丙子復丙辰丙子無垢謫丙辰余被謫居然百載下青山招我來寒燠任更謝寤寐古人心處變亦如暇紛紛艷孔張翕翕嘖賈馬世道長江流何人屹中夏漆室空興嗟且酌宜城斚寄時天彞亭亭萬木林古柏集新翠凌厲雪與霜不凋自天粹清廟嗟欲頽誰堪棟梁器之材百世珍造物巧相遺豫抱憂國心相逢喜忘寐草周濓溪先生窗前草不除云與自家意思一般故豫作草詩萬卉爭獻奇小草亦足貴四時春不斷可識天地意稚子謹勿斫葉葉含元氣人皆訝姑息姑息特細事秖恐生道滅形色鼎中沸菜黃山谷居士有言士大夫不可一日忘此味斯民不可一日有此色故豫作菜詩鉏荒種新雨擢秀美且艷生理未羞窄採擷足飫饜每擅筐筥芳湘以鹽與釅舌根多嗜珍味爾乃針砭充之宇宙間境境浩無缺夏夜青燈人語寂池塘響蛙蛤孤坐如老禪門開風自闔謝惠笋飢腸數日吼往往茄莧爭幽人盻寂寥餉我慈竹萌斑斑未離䙀白下莫與京寒泉煮青茒手調玉版羮招僧招不來貰酒乃獨烹茄莧避三舍紙帳午夢寧月天公屬月為眼睛曉夜不息天中行癡人習見圓復缺謂此眼睛非長明渠思一照千古白奚分朔望隂與晴彼昏病癡苦營營以月視之蠅在罌贈江山人精地理相山如相人不論肥與瘠神氣參有無毫釐千里隔今古非茫茫山骨水為液誰歟璞輅翁眼為天地碧和紫陽先生感興詩二十首至理根一初精微實髙廣寄之形氣中今來齊古往衆曜列太空環侍惟斗仰變化妙不測虛靈本常朗井坐識易陋簾窺學云罔靜玩感興篇剖陳如指掌隂陽著太極萬化惟一中權衡迭軒輊樞紐相始終人受命以生今古稚耄同彼昏自不覺安用尤聵聾仰觀復俯察上下融真機元氣無奇耦魚躍鳶自飛神聖奠中域靜動心勿違天地斂諸躬照以日月輝遜志納衆有先慮周萬微胞與豈不夥游泳皇極歸造化泄元祕河洛圖書出龜龍亦何心以靈乃受役微旨竟先天妙用普經國三聖受心印執中數語畢詁學長枝蔓往往膠陳迹偉哉千載下元公指無極文盛起太息姬壤半淪夷仁積天所親道喪人已離霸圖迭雄長明詛興自兹王綱久不競覽卷空涕洏日月照干戈風雨撼璧圭仲尼不夢周世道無復為元氣日以薾荏苒朝露悲嫠婦抱隱憂忠矣非知機宇宙浩無際主靜即其綱靜非寂以槁密運治乃良公明闥晏燦忠慤消彊梁山河帝居壯日月天德光八荒囿一和此界均彼疆鴟梟息晝鳴鳯凰梧桐翔黔黎歌爾極逢掖趨大方皇風播品物道闢淑運昌樞機不盈握妙斡見弛張奈何動志靜反袂千古傷我聞嬴秦氏威力橫提封北方迤長城中土銷春風阡陌鞅肆孽簡編斯造凶民命眇以墜天勢巍且崇中焦痼成痞怨氣蟠壤穹炎漢一洗之詎詫百戰功規模納羣策意度恢大公約法止三章赤子歸包容溺冠膠餘習莫致商山翁過魯嘗藏祠猶足醒昏蒙東都黨錮禍機阱深九淵標榜起俊厨接踵沈黃泉西園久握爵龍門昧幾先忠魂招不返炎祚孰以綿諒矣文君癡猶覬冷燼然吁嗟萬鈞壓一線那能牽坤輿載五嶽乾象垂三光太極宰元化俯仰無低昂一理貫萬有形色皆停當晉風競清談幽眇誇輝煌坐銷白晝盡狐兔睨其旁天地亦為愁何但頽偏方立朝觀大節炳炳在行已李唐號多才屹立整頽紀前狄後有韓髙風世仰止孤忠翼正祚大論闢非禮老幹挺冬嶺明魄浸秋水均抱扶世心勳學豈殊軌默觀羲聖書先天著復坤畫畫妙理具森立河圖文宇宙斡生意日月寧辭奔乘承著不息反窮性存存透彼名利關洞此道義門用功不精密頻復何由敦詩道發金石世苦壁聽訛正色落芻蕘一掬真意多衆竅本虛寂其如天籟何不悟康衢謡不識黍離歌禮樂節性情工夫貴深省愛親篤氷履酬世尚錦絅勿任忘與助一敬收衆騁威儀筋骸束趣味精神領相彼屋漏中森若指見炳窮達付天分靈光勿隨境書法嚴貶褒明辨邪正根寒暑自迭禪日星常與存浮雲豈不翳昭晰誰其昏筆削匪爛報執拗開亂原仙佛各有門託言深入山一探寂滅宗一透鉛汞關菩提悟非樹刀圭詫靈丹槁形付塵幻蛻骨沖飛翰咄咄亦奇事詎憚力到難儒先著明訓整轡皇路安智巧役一世往往悲古愚觸蠻榮利場白日事浮虛情流失固有意騖希本無相與龍斷登獨不捷徑趨是非遂倒植大道歸糊塗發憤中夜思猶有未亡書扶輿播清淑何代不育才森森萬壑松盍厚拱把培蒙養正性存臨教大義開嗟哉古道息習氣少已乖區區黃册子所事惟奪魁户庭且得色斯文何望哉人生戒悠悠蚤已暗大方卓爾志有立不墜炎與涼孫弟浹閭里孝愛充室堂應對動以恪操存靜而莊見善如乘珠視惡如釜湯毫釐貴明辨造次宜謹詳勿謂居壯年光隂隙駒忙窮理養夜氣任運為沈翔交游重金石里巷毋泛尋胸中抱明鏡妍醜不相侵熱交但以貌冷交惟其心勢利易茍合道義難力任詠春發真趣邀月開凡襟夷險祇一節雞鳴風雨林聖人不可見猶幸聞緒言萬古宇宙立一脈理義溫専門鑿私智百家起􅂒喧太陽炳離照坐收烟霧昏魯語本非略軻書豈為繁資之歲月深左右皆逢原送茶我得新焙珍如金持以餉君將我心縱無龍文與棋局白雲一碗搜書林玉川不作陸羽沈茫茫世上誰知音曇濟道人亦復往八公山頂留荒岑我生與渠似有分一日不見幾成瘖檳榔是弟橄欖兄大抵苦澀味乃深車聲出鼎策奇雋書窗靜坐聞山禽悼使君趙計院我作壽公詩倏聞公已古道路涕行人田閭愕農父謂公肫肫仁潤澤溢橫浦穀我艱爾振寇我驚爾撫涉我病爾梁役我殫爾宇冬我瘴爾雪夏我魃爾雨飲鄉羅俎豆建學闈儀矩善政襲西都文風被東魯闔一郡三邑擔簦白繡斧草木為動色禽魚亦掀舞誰趣玉樓文竟奪鯉城主人物落曉星如公不多數豈但賀白倫端與間平伍我崎嶇逺來不絶命如縷凄風守憔悴暖意勤噢咻我生特蝗粟公死即傾柱顧我莫贖公龍德嗇下土矻矻何所思矻矻何所思一默照羣妄門外風雨深山鳥亦不訪有書足遮眼寤寐古人樣菜根清苦趣木朽支離狀深衣持夜香往往禦烟瘴矯首知己賢大有蒼生望餞傅理掾一郡一理掾橫浦為之宗青青草不枯曽識無極翁遂寧起鼻祖陸續書問通乃今有耳孫力學追遐蹤潔靜二湛水峭介雙秀峰平反幾春意坐令古犴空政最復政最匪詫赫赫功庭草色若何還與慶厯同歸歟浩無怍扁舟驚輕篷邦民再見公繡斧番禺東寄與權器之二友鴻鈞盎一宇何物非生意輪囷得此剝而有此憔悴根蠧聚蚓蛭幹古禦魑魅旦旦斧斤尋九殞特其易飛鳥不敢棲何哉蓊蔚芘風雨極震凌霜雪苦顛躓天地大父母榮枯均厚施腐植産靈芝至美終不閟桃李信春妍奈何骨嫵媚秋心秋日日苦短秋夜夜苦長長短不易晷處厄心自傷秋風獨有聲葉葉闖我窗秋月豈無情隙隙窺我床苒苒寒事迫孰整衾與裳故鄉隔萬山籬菊那能芳城中有髙樹城中有髙樹與我相為鄰薄味生古道靜坐疏今人淵明酷愛菊張翰勤思蓴蓴菊我何有一杯天地春避冦寶祐戊午年戊午九月十洶洶羣冦生匹枹與赤水參㑹童石氓童子保石門保烹牛飫凶豎剚人諂妖靈長驅無齟齬四境騰沸羮野廬競趨察㕓市爭奔城啼號震暮夜隂氣昏冥冥攜持半箱筥扛舁及甕罌雞豕頭駢闐脅息驚吞聲宇內同一胞何事起攙搶據險惡氛聚血牙餘種獰原嶺迤巢穴習鬬惟輕生擲首視為戲揭竿誰敢攖父老謂曩日草竊恣橫行羣將出奇計一𠞰諸峒平老熊痛已定悍虎謀方興若非急討捕終難保桑耕官兵駐大曷警報馳飛星探旗逼軍旅登城羅義丁菱角隱厄塞松明通曉更山前號令肅鈴閣籌算精匹馬熟往來老稚倚以寧溪潛鱗且遁林散翼亦驚顧豫久放逐逢此增伶俜夜寢不忍睫朝餐何所營無垢畫火攻坐令妖祲清張侍講九成謫南安時冦作畫火攻之策遂擒之孰謂毛錐鈍不逮蝥旗登雪屋為吳夢蟾賦一廬天地寬玉雪照四壁天風吹不搖夜半響鐵笛彼美人無眠梅花對岑寂訪戴獨回舟破蔡誰草檄靜坐斂逸氣中邊透虛白平冦西江十二州自昔聞冦警按圖覽上游峒俗號最梗嗜殺等兒戲縱掠恣狼獷右通崆峒東左接梅花嶺郴桂貫肘腋相據易馳騁巢穴聚一邑流毒烈四境寶祐戊午春童石肆不靜童子石門二保蔓延及夏秋養成癰在頸聚落焦山寨㕓市空竈井田野寂牛鳴道路息人影焚劫不可計聞問已先哽太守趙大夫一念切救拯符移密有置紀律務森整憲鈐選精鋭剃獮赫弄挺凶醜惡已貫屠虜勢猶逞提兵總郡將指授疾雷霆直搗姜坑屯鋒交生死頃夾擊馳若神賊潰亂奔町輜重委荆棘纍纍殊首領義丁羣搜山擒械半雄猛天俾殱其渠陽精遂昭炳窠蜂果何號花獸亦終穽顧汝宇宙同乃甘犬羊並如醉復飲酒亡生不知醒聖德溥涵濡皇心極忉怲造化開生機春寄雪霜冷詠月追和韓昌黎韻初秋十五夕皓月來滄溟白鷺與共色烏鵲能踐靈逢掖覓桂䕃孩提窺兔形涼氣淨餘暑浮光滑青冥列宿各韜彩腐草休衒螢浩蕩靈槎泛瑩潔仙掌泠門靜送佳客窗虛照羣經佛閣髙低見譙更逺近聆竹風搖瑣碎花影列娉婷靜坐禪安室閒行詩繞庭銀河占米價璇象認文星何處笛傳浦誰家酒散亭深閨悲蟋蟀逆旅訴蓬萍水濶平連素山低逺抹青有心齊肘腋無計得輪停八蠟神司社方諸溜納瓶魚翻波可樂禽警露頻聽歷歷天疑近沈沈夜不扃廣寒非寂寞沙界遍輝熒盈闕天之理堯階任落蓂餞李叔飛赴劉朔齊招五侯之鯖紫駝峰鹿鹿鬬飣難爭雄世多果腹鮮知味北斗以南推朔翁桂林延入蓮花叢相邀皓月烹清風詎羡鮓麋與胹熊座有一珍羣品空舂容樽俎須折衝海戢鯨波列上功六友詩寄林景雲留壽國林道初俞季淵靜友蘭靜友性不凡惟嗜土石瘦與草似無愈於吾如有舊抱獨足養真韜芳何深茂清風苦好事揄揚古今宙直友竹直友古耐交莫問三兩箇玉立君子姿足以警吾惰虛心內有容徑節老無挫荒逺親舊違得汝乃自賀淨友蓮淨友何亭亭修潔得自性本生淤泥中乃與玉同瑩一淨消萬暑特立起羣敬色香非色香是謂花之聖髙友松髙友住山中無心涉塵圃山中有明月明月照棲鷺幽人眠不成披衣起閒步相得靜無際勿訝秦官汙節友菊節友獨愛秋相得匪遲暮受氣惟至正睟見黃與素飽諳風露味甘守煙霞痼如何千載人僅一淵明遇清友梅清友天賦完歲晚樹獨暖粲此白玉英瑟彼清廟瓚香自根中來氷雪匪壓斷一見一回老殷勤呼茗碗還談鳴玉北枝藁天下惟此花渠町南與北有翁號北枝似惋宇宙塞紛紛紅紫蹊陽春豈不力枝北春雖遲今古氷霜特贈鍾春谷星學五星聚東井老人現端門總是太平象渾儀妙用存巖傅本騎箕執築付無言一旦寄霖雨夜夢形至尊試問古馮相此數如何論太乙照西蜀子午斜谷昏毗陵星霣石田里春風溫穹壤一理氣理為氣之根步推尋其元太極昭乾坤餞湖南趙提舉丹湖偉人維南城胸有老范真甲兵挈來庾江鎮魚壘坐令闕無驚峒獠習鬬不識機亦以出草為常程痛勦根株讋羣鬨方知弄梃不如耕吾皇詔趣度湘水溪蠻辟易梟休聲玉節清風肅九郡清風肅處春風生邦民借寇欲斷橋願公為我誅鯢鯨邦民愛公欲植棠願公為我銷欃槍愛旗獵獵羅道左竹馬截鐙兒童爭我為峒冦特區區更有西江狡謀成蜀危纍卵淮破甑聲東擊西誰拄撑二矛重弓列御屏衡山雲起瀟湘清指日南城障東南托天半壁一柱擎願摩浯石歌中興古興和饒雲峯韻貧婦守蓬藋憔悴無顏姿挈瓶養公姑肯涉山徑蹊夫君昵浮響疏越成暌離家缺蠶織具茹苦寧力支叫天天不譍聽彼風雨迷明月古𤣥鏡清夜長分輝見月如見君此道惟心知造化毋羣動一耦仍一奇得耦固有分失意吾何悲緑髮已改色素節難轉移君有內覺時伯牙逢子期賤妾命猶紙青燈傍低牆羣艷逞春嬌半葉難言芳手織補天線五色生輝光主家不顧盼內美誰鋪張妾命痛在身病痞非病狂滴滴肝胃泣奚暇宫樣妝層隂閣深燠雨露膠雪霜猶記承恩時曽不一餉忘忠勸勿飲酒闕恕乃溢觴妾心諒安往勿飲君壽長渠知滄海深難以升斗量聞陳正學理琴聞君整琴待秋風我欲從之魂夢通素麻髣佛蒼髯翁揚休山立崆峒東淚痕猶濕龍門桐有曲無音悲天公猗蘭未冷拘幽濃那知斯道將遂窮山矸石爛冥感叢枝蜩盤蠅迭相雄兩耳年來怪不聰羣哇擾雜安於聾煩君為我調怔忡流泉隱隱深澗中春溫亷折各不同聲雖在指意在胸雲飄栁絮風入松恍然樓閣坐虛空伯牙所知何必鍾白鶴飛來采芹宮梅使君守橫浦擒寇閔雨猛虎久負嵎吞噬草木痏流毒烈贛吉一呼蜂蝟起老天福黔黎雪村鎮梅壘指授討捕略前驅謝張李火箭窮其巢推算捷如駛露布星火馳餘獰悉披靡大暑熾焚惔心薌焫一縷甘澤隨車至咸曰雪村雨人事天道協除惡乃臻媺洞落洗腥穢生意從此始雞豚醉秋社老農自相語生長子復孫一飯不安七南人今不反合爪鯉城主願緩除書來德風遍田里喜雨呈趙使君崇栗閏餘五月即六月一雨不來天欲裂邦侯赤心走羣望喚醒癡龍睡時節雷車風馭相後先甘霔連天聲未歇茅簷靜聽老農語今歲敻與他年别煙瘴壓低曽見雪晴未兼旬雨復咽區區枯草寧有知孕出靈芝光吐結邦侯求仁求此心表裡不欺天地徹為霖何暇蜥藏甕占雲已喜鸛鳴垤斗頓溪流髙一尺盡與疲氓洗炎熱晚禾獵獵實方腴早稻津津香已馝饑者可飽飽者逸深夜城簫響清絶持此豐年還聖主願同何武歌休烈與李叔夔錢子雲同遊興教寺約齊都巡古寺壞壁存菩提又有達磨蒼龍如我來問訊若舊知宇宙中間真蘧廬朋儕邂逅誰親疏秋風相對一笑醵杯行草草復徐徐山僧野朴談古初謂元城老當此居浩歎不足歌繼之滿庭燦燦木芙蕖疑是萊柏鄧栟櫚人多病俗不可醫天欲廢道還從渠儒生腹大能幾圍但教盛酒勿盛書栟櫚事用誤東坡謫惠陽寓嘉祐寺種樅樹耳和酬張梅野郭行載酒相挈提躡根探窟天津如相逢何必皆親知天地許大猶吾廬矯首梅澗跡若疏舂容婉畫妨清醵詩如琴絃分疾徐驚我一聲聾聵初蕭蕭白日金仙居東西求仲時從之靜對夕陽搴紅蕖或聽夜雨鄰翠櫚國步孔棘須神醫縱有鵲醯誰信渠風傳西事方解圍願君勿藏圯上書和談學士見寄大道久磔裂啾啾夸毗子倣佛皮毛鮮孰探古人髓我亦坐兹疾默閴照非是束身雲瘴鄉凡論悉掩耳夢不到伊傅志惟髙角綺人生駒過隙鹿鹿何時已耽書夜不睡省事日髙起疏苧寒亦燠硬菜苦猶美非忘漆室憂莫救沙界痏生死不可料何哉為泰否佛祖顯雲封道源開嶺趾誰云築底邦亶為通德里廬陵有可人訪梅一至此扣我理義關無言但心只新篇發天趣步驟古詩史窮通從所擇柔舌與剛齒一舸一舸泛漭沆風濤正掀舞駕空赫魚龍沈浮未知所同舟一性命俱父父母母倚門望兒歸天亦諒辛苦胡為託笑言射影學溪弩蒙川遺稿卷一
