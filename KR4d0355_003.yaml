body:
  text: 蒙川遺稿卷三宋劉黻撰七言律詩園翁租得西山數畝園自甘學圃竟窮年芟鋤如秉太史筆種接應分造化權編竹為防鄰犬踐蟠花不礙樹禽眠聖朝徵士惟科目束帛無因到爾前梅花之子孤髙勢莫攀分甘肥遁此林間獨先草木有生意幾歷風霜無老顏氣質泠泠全太古聲名籍籍重孤山時人却擬調羮手到底調羮不似閒葦航世路崎嶇即險灘扁舟隨處著漁竿主盟鷗鷺交全淡管領江湖夢亦安吟定月侵蓬戶靜釣閒潮打石磯寒即今航國真難事莫作尋常一葦看錢塘觀潮此是東南形勝地子胥祠下步周遭不知幾㸃英雄淚翻作千年憤怒濤雷鼓逺驚江怪蟄雪車橫駕海門髙吳兒視命輕猶葉爭舞潮頭意氣豪偶得淡飯清茶處處安學儒容易識真歎風無形跡通羣竅日有光明阻覆盤竹色滿庭留夜氣栁隂夾徑怯秋寒世間萬象俱呈露輸與山人自在看王宗臣趙處仁鄭季克同游分得村字出關非為看桃李愛識西山深處村舟泊野橋分栁色屐尋閒徑破苔痕鳩占欲雨喚夫婦雞傍殘陽聚子孫得友不知商議久歸來燈火已黃昏黃山樓風生汐惡舟難去獨上危樓立暮雲數片斜陽隨處沒一聲清磬隔江聞廟靈古木懸新紙碑老蒼苔補斷文慚愧年豐官酒賤往來人每樂醺醺雨中和酬賈君寶亷纎花雨送殘春不出書樓動數旬閒夢有魚占樂歲瘦形如鶴耐清貧漏欺白屋添苔暈澤濁青林長樹身惟憶西湖舊遊夕光風霽月幾精神寄魏僉判君住龜山我雁山天教識面帝圻間書樓自喜看山色詩卷相尋待月刪鏡不可欺知貌改寢惟無夢覺心閒西湖大有真泉石何日攜琴更出關寄徐經畈吏部舍則安貧用則行休嗟時事幾番更鸞皇只向明時出鬼魅偏為暗處生改秩屢勤天子詔養親甘共野人耕要知出處惟參易莫學鴟夷變姓名又寄元陽詔墨動天霞喜到東都處士家世路幾年滋艾草道山今日聚梅花作舟濟國看商傅鍊石補天過女媧珍重諸賢扶大道聲名毋使後人嗟愧不柯山與執經曽將尺紙話飄萍六年憶别心如醉一日相逢眼倍醒結友苦無鷗共志癖書瘦得鶴同形自憐所性惟方拙水潔山髙即座銘題江湖偉觀栁殘荷老客凄涼獨對西風立上方萬井人煙環魏闕千年王氣到錢塘湖澄古塔明寒嶼江逺歸舟動夕陽北望中原在何所半生贏得鬢毛霜投趙玉堂使君鑾坡榮拜錦袍新雁蕩行春作守臣無擾可回民氣脈有才能振國精神柝沈海嶠三更月草長池塘一雨春聞道鈴齊少公事肯分吟席與樵人和何明府愛蓮詩濓溪題品非輕許秪愛亭亭臭味同日晚色歸霞照裡夜涼香在月明中獨慚冬葉留寒翠却笑春花學醉紅天付清姿嘗淨植曽聞結社有陶公次何愛山喜雨韻梵宫默禱託爐煙火繖愁張六月天雨倐隨車符蟻垤水分沃野免龜田已知簾影多琴暇更與花封結飯緣坐聽四方同潤澤庶幾大有特書年偕剡中諸友遊明心寺一春風雨掩柴扉今日相羊竟晚暉山逺從誰尋古蹟水髙何處認漁磯衣冠揖遜禽魚恱觴詠流行草樹馡共出戴公亭下路邑人疑是舞雩歸挽趙少卿班升金掌擢清才苦欲歸田挽不回浙右尚思菩薩去荆南空望使星來苔侵書閣秋山靜竹鎖吟庭夜鶴哀路出簫臺多巷祭幾人和淚折寒梅挽曹夫人一見豐碑已愴情大家名重乞誰銘金花屢錫華封誥白髮重看禁從榮三世種成庭上桂一生讀盡藏中經當年曽佐先夫子誓守潼川冦自平挽楊砥軒録參訃落鄉山各淚傾世間難泯是賢名一生官正為州掾到死人稱似砥平夜燭已殘賓館寂曉梅空㸃墨池清秪應養得丹砂熟却向金華洞裡行挽萬竹西隱君哭到先生道已窮夕陽千古起悲風耆英㑹上減名哲髙士傳中添此翁闕呈經畈徐左司以下橫浦作五載相違一日過巷無車跡有樵歌因嗟世上深危證合住山中養太和蔓草不知春事去梅花曽識歲寒多豫今問道三千里白髮雙親可奈何貴溪道中自昔輸忠多賈禍逢人何敢說抨彈三杯村酒逐時醉五里堠碑隨處看行李無金童僕歎深林有虎路塗難流行坎止吾儒事但把胸中易自寬賦求仁齊和趙使君崇粟一編論語半言仁克復工夫理趣真斂在黃堂三寸地散為橫浦十分春元陽有宰羣霾伏太極無邊萬象陳生意源源如穀種即為天地本來身道源父師兄弟一堂深貌像如生世所欽直向端倪明萬古不専占畢詔來今地靈香火溪山護嶺近衣冠嵐霧侵千派萬流同一水來從濓洛洗人心和酬劉監嶽四十餘程到庾關到來無日不看山誓持氷雪松筠操肯學春風桃李顏一飯不忘三祝處寓寶界寺有堂名華封三祝瓣香何慊二忠間有二忠堂劉忠定張文忠二公寓此梵宫咫尺騷壇近猶願奚囊續往還橫浦有感風雨憂時夢不成忍將佞舌博功名學如谷永生何辱節若劉陶死亦榮蒼蘚無心同客靜寒梅有眼照人明此邦風物多淳古曾識濓溪與二程思親擬著青衫歸拜親青衫未著已危身鴉山地阻無書到雁蕩峰髙有夢頻節物荒涼嗟逺客家庭笑語愧鄉人葵心但秉丹𠂻在冬極從來又有春和趙友竹呈求仁使君賢哉太守即長城領客郊行天放晴鷗鳥不驚知政靜樵夫相對說官清騷壇突兀誰劘壘學海蒼寒敢濯纓世事無如一杯酒龍門謹勿太標名次酬胡編校賦竹屋癖為看書借壁光肯隨鵬鷃論行藏聽僧魚鼓齊糧辦留客茶杯禮數常小屋槃姍貪巷靜矮簷傴僂笑身長黃花也識人寥落不待重陽已吐香紫氣曽臨屋有光老僧相對說修藏貌癯漸覺衣冠古交淡誰知道誼常文類錦機君獨艷才如襪線我無長近來悟得安心法菜飯蒲團一炷香一屋中含萬象光掩關獨坐類龜藏梧桐弄月思康節楓柞吟秋憶履常事到中年心更懶人從多難識應長幾回夢覺南窗下聞得鄰家煮稻香賦望雲寮家山一望三千里華髮雙親七十稀自許朴忠寬社稷誰知甘旨誤庭闈菜根有味逢春雨草色無邊傍日暉總總白雲何處是夜寒結夢但東歸謫居無垢雙趺十四年豫今恰已一年全開窗賸向春風坐閉戶閒聽暮雨眠白髮相尋非偶爾青山可對只依然蘧廬世事皆如此且誦先生庭草篇次酬楊德中丹心炯炯老天知莫問人間識者稀孤雁過門思古蕩慈鴉滿樹憶重闈醉因酒賤歌豐歲寒覺衣單戀晚暉珍重五窮同寂寞忍教結栁向誰歸挽妻母鄭夫人龍圖鄭先生景望之孫詩禮傳家耦吉人雍雍完得性中仁鄉評莫識生前面堂影惟悲死後身孀節虎號墳柏夜婦儀魚憶澗頭春九泉寂寂應無憾雙璧分明作世珍幸壻名門僅兩年一編心事苦難箋袖因哭婦痕猶濕觴未登堂訃已傳自悟浮生如泡幻渠知黨禍熾株連墓頭片石垂千古亦把蠻煙姓字鐫此意此意蒼蒼曉不難罰令狂士受飢寒春風縱好惟貪坐夜月雖明亦懶看杜老却因貧得句陶潛非為拙辭官世情一味嫌清淡多刈幽蘭種牡丹壽趙使君計院求仁先生西江郡以梅花重無愧梅花有此翁學到靜邊皆實地仁常熟處更春風吏看判筆如神異民擬生祠與佛同願為八荒開壽域歡聲何但鯉城中次胡潛父先輩聖世如何肯棄賢唐書筆削賴君傳山雲相望三千里嶺霧同游恰一年才刃固難居衆後智囊猶缺燭幾先嗟吁寄跡寒梅下白首青燈哭訴天用韻自述掩關誰復抱琴來靜坐工夫欲換胎事到平心方是道行希前哲奈非才鏡中華髮侵尋矣松下衰翁矍鑠哉畎畝未能忘一飯經綸猶願濟雲雷喜劉主簿歸同是青藜一祖來晚成天欲老其才家傳虎榜新承渥人說犧經舊屢魁春色風流都羡栁歲寒事業莫過梅誰憐歷落如蕡者閒把離騷咽一杯病鷺得汝相依若友朋無端鳴啄頓伶俜莫親野水應生夢幾立斜陽不整翎肩聳可齊工部瘦神清猶逐楚臣醒人言氣習多濡染却笑吾今鬢亦星問鼠隻影投荒閲兩秋汝曹何苦侮畸囚詩書盡嚙從誰訴冠履俱傷重我羞相國溷人寧處垢永州某氏未輕投翻盆攪甕何時了肯事張湯法吏不偶書暮雲漠漠數行鴉心事凄涼正憶家不向孤山留諫草那能庾嶺見梅花峒丁嗜鬬牙成血楚俗趨蠻髮半髽明日絶糧難早計好㪺流水嚼胡麻梅花人誇之子得春早道眼看來春最遲萬木已悲山欲瘦一花才與水相宜乾坤寂寞常如客今古平章無盡詩說著色香猶近俗丹心秪許伯夷知章江信筆自從謫向章江上兩飯惟聽寶界鐘尚憶賈生陳痛哭肯為胡廣說中庸春風舉世知騎鶴夜雨何人識卧龍吾道未嫌拘縶苦一編炯炯照人胸和陳大庾新建邑庠講堂從來道體播翔沈黌序舂容領佩襟庭草靜中春不老嶺梅孤處日相尋艮䝉已探聖賢藴剝復方知天地心賴有諸公扶大道如豫未害入深林和酬黃霞碭見寄此心難與俗人言終日深居養浩然學到苦時方見道數當厄處不由天煙霞約客成三友風雨憂時及四邊珍重故人相勞苦器之元與鐵同堅十月十三生日居常出户便思親況復流離值誕辰命薄不嫌增甲子騷清猶可記庚寅菊香留晚招同醉梅意才先喜卜鄰警省工夫須力進客髭已有數莖新和郭帚齊詠龜泉鎔出形模造化工石龜中有冽泉通來從西峽蝦蟇碚靜鎮南源瑪瑙宫潤澤一城消衆渴澄波千古照孤忠貪亷名氏俱標榜無涸無盈道不窮春雪和談知縣韻酬北枝雪到南邊不論春倚䦨萬象縱橫陳糢糊世界山川老軒豁人心宇宙新鏡沼窺鸞應眩眼藍關擁馬最傷神功名悟到空花處輸與當年髙臥人諸葛武侯髙臥曽吟梁父詩痛無針石活當時天公未墜炎劉祀心事能令先主知八陳尚存驚對壘一星才落便無師勛忠遺舄藏岷蜀老柏蒼蒼萬古思韓文公斯文久矣歎荆榛一疏披忠徹紫宸不忍中原生祇樹甘尋南土作纍臣鄒軻以後功何遜魯道于今脈尚新宇宙欲昏星斗落空山韓木亦悲春杜工部禾黍秋深泣亂離盡將歲月付於詩天髙有語雲霾隔夜半無眠神鬼知心抱孤忠生已晚身逢多難死應遲自從大雅收聲後賴有篇章續楚辭和帚齊見寄栖栖慣聽鼓魚聲心印相傳第幾燈江有白鷗閒似我地惟蒼蘚懶於僧吟難用世皆東野窮亦憂時秪少陵多謝故人相厚意一箋當暑敵凝氷詠桂呈張二車昨夜秋風吹作花異香早已滿天涯蓬萊深處兩三樹風月分來第一家綽約道妝如侍案婆娑醉影欲乘槎廣寒莫遣癡蟇食留取芬芳與世誇餞梅提刑梅花山下送先生持節西江衣錦榮國步正巇須砥柱邉塵方漲待澄清來時野草知春暖去路山禽語日晴不怕風寒今滿地摩挲浯石記勳名絶句聽松寺門松未老早有鶴來栖一夜枕衾冷半天風雨啼同俞季淵訪王修齊遇雨次季淵韻投宿西山雨抗論由羣居冥冥白霧深誰臥隆中廬涎酬五羊李子先見寄春叟山深萬木寂一片古心枯昨夜梅花月相期道不孤餞潘吳二察院去國五首兩豸歸歟一相留孤山草木亦含羞忠言不必排閶闔付與錢塘江自流塗碑共說臺官去局面還憂宰相來今古幾多興廢事只緣忠佞是胚胎誰新白屋當靈鷲倚漢橫霓幾棟梁因想中原陵寢處斷垣衰草正斜陽宰相從來號讀書晚年似欲效癡兒癡兒多病傷於飽爵祿如何對飽時生節雷聲午夜殘囊封一疏奪氷寒先生此去非沽譽留與時人作樣看和薛仲止漁村雜詩十首料理楚辭甘冷閴卜鄰惟喜近漁家昨宵雨過平湖濶閒看菰蒲添幾花半生心力左吟編鍊得形如孟浩然水屋數間城市隔客來無路只呼船老松瘦竹可相儔稚髮駸駸到白頭世道已如寒日晚惟消把酒賦三休非逺城中欲避塵漁村鄰里笑言真自從范子扁舟後肯著蓑衣有幾人酒欲醒時鄰已靜斗橫月落尚聞橈炷香杯茗燈相照不枉人生又一宵甘友漁樵懶做官靜占時事轉艱難近來地氣如南瘴臘月梅花不識寒苜蓿村中卜釣磯臨流搆屋不嫌低屋頭所種無多樹大有新來白鷺栖情性常嗤俗者勞世間何處免風濤小舟泊向荷花蕩一箇漁翁熟睡髙幸觀世事已忘機觴詠流行度幾時萬物本來同一性可知猿鳥不相疑白髮疏疏青道衣苦吟應有鬼神知篇章但可陶情性羞殺唐人自獻詩寄西弟六首寂寂書堂秋夜涼一編心畫一爐香弟兄動是經年别羞見天邊有雁行儒生事業戒悠悠鑿井求泉須到頭要識汝兄勤苦事頂門白髮一莖秋千里家山入夢頻又封書尺寄行人未慙定省多疏濶守道安貧即是親汝兄望汝撐門戶汝不耽書奈汝何汝看二程兄弟傳肯將幾月付蹉跎向上工夫肯憚難須知簣土可為山若還志力無回轉直透龍門亦等閒一别獅山千載期蕭條吟屋費修治手栽門戶新楊栁試問春風長幾枝訪西湖東風吹客到西湖汀草沙禽半識吾惟缺數間茒屋在種梅花處伴林逋寄社中暗壁寒螿聚夜愁孤燈相憶話綢繆雁來不接西風字又見黃花老却秋譏劉祕監獻佞固寵白玉堂中翰墨師忍令奏牘玷塗碑向時剛道梅花纍今纍梅花自不知題禹廟雲癡雨妬不相干古廟深山萬木寒水土平治今幾載猶聽父老說艱難京邸思家小樓終日戶全扃詩卷閒消客子檠城裡不曽聞杜宇尚疑三月未清明賦何明府愛山堂終日看山終日好山不恱人人不老愛山誰識愛山心瘦竹長松兼碧草皇恐灘橫浦作十八灘中第一灘舟行風順不知艱諸生歷落誠皇恐世上何人敢犯顏和姚正字用趙信菴韻題召星館朔風吹客上江西歷遍山崖與石溪野鳥不知言有禍晚窗猶自向人啼和葉正父見寄前生疑是老頭陀却笑今生狷憤多謫向梅花嶺根住禪關參得祖師麼寄友瘴雲未免鍾儀縶夜雨應憐范叔寒尚有慈闈年九十空揮客淚落江干和漁翁四絶滄波萬頃即良田一舸東西臥碧天鬢髮如銀長是醉不知生甲是何年得魚換米傍村歸篷底烟生濕草炊醉倒船頭呼不起斜陽捉蝨有孫兒收網移舟月上時西風吹浪膾鱸肥任渠官買髙聲叫醉臥蘆花别處磯世業相承不裹頭一家全在水中浮有魚便可供沈醉休問清流與濁流硯色若馬肝微帶紫星如鵒眼更添青端方一靜渾無語即是吾今座右銘十六夜月何處吹來笛一聲長空如水浸江城中秋有月雲偏妬底事今宵放得明次酬陳雲谷書空咄咄懶題詩深愧敲門客問奇嚮晚小窗閒逺眺西風吹霧出秋峗和建小學韻呈趙求仁使君黌舍臨溪靜最安朋來俊少共窺斑能知格物如星稱即是程門第一關理非精妙事非粗一性空明徹萬殊白髮聖人由稚子常惺惺處是工夫襟珮歡迎師帥來讀書種子賴栽培他年濟濟雲霄路誰信清朝歎乏才浦出西江有此名道源澄湛自天成屋頭松樹年多少曽識濓溪授二程對月三千里外無家客四十年間苦學人山隔不知雲近逺秪將明月作鄉親謝李叔飛惠酒清談莫療顛危證白墮堪澆磊塊胸今日得生今日福世間萬事付青松贈相士火色鳶肩類馬周南冠濩落楚江頭道人莫說閒榮辱且對梅花索笑休贈五星術士星斗捫胸遡李袁嶺梅誰問命艱難彊宫緣被孤星主合向山中守歲寒用坡仙梅花十韻愛梅被酒閒憑茗主和惱人風動不消多月髙片影橫窗上夜半無眠客奈何訪梅山寒木落峭孤臺南北常分冷暖開自笑三生如結習每來月下立蒼苔見梅水邊林表幾徘徊索笑清尊不憚開秪恐對花無好句却成辜負一年來探梅只辦茶杯與酒尊山中寒日易黃昏今年閏月遲消息枉費清宵幾夢魂詠梅草木班中有此花暗香浮動影橫斜古今陶寫閒情性惟說西湖處士家遇梅冷淡生涯合晚開老天故遣雪頻催相逢喚醒平生夢不誤山翁特地來訴梅清入肝脾冷入肌天機忽露兩三枝為渠瘦得身如鶴詩病除非詩可醫擬梅花事俱空葉亂飛孤標强項發枯枝溪山的皪無人問鐵石心腸雪凍時友梅玉骨氷肌練恱輕縱教雪壓色逾明太清不入塵人眼完得平生淡性情贊梅萬卉千葩總一家木心才蠧脈皆邪山窗玉立如風憲人指為花不是花寄壽二親三首萬竹森森一水泓堂名徑逸即蓬瀛賦詩何必多工部怕與梅花共瘦生榮拜花封感聖主壽杯阻莫捧親前嶺梅尚有逢春日辦取斑衣聽老天甘向清朝作逐臣茹蔬觀草即經綸心香都在寒梅上宇宙常逢不老春賦韋軒人性之偏懼不知西門為此佩柔皮報巫依舊傷于急涵養工夫熟者誰蒙川遺稿卷三
