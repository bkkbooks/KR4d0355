body:
  text: 蒙川遺稿卷四宋劉黻撰賦明堂賦淳祐五禩季秋中辛朝家藏禋遹駿寧考肇陟嚴配聖孝通幽百神效靈金景開祥上帝宴饗允乎休哉雁山劉黻瞻禮容而拜稽曰古聖王之建明堂順時荅貺尊祖敬宗不㤀其始厥後迺以黄琮鴟尾鐵鷟金龍而耀美觀抑末矣於穆我皇先尊故典不侈不嗇欽兹一忱以令執事神人洽和厥應如響然植木者必根演流者必源隆家國定社稷必建太子迺今嚴父之侑雖陟中儲之位尚虛寧不孤在天之靈故作明堂賦其辭曰皇鑒哀于下民兮屬萬物之最靈羣爪力而爭分兮賴上聖而始寧領天牧而巍處兮匪生殺之我私庸典禮以崇本兮欽后皇而藏祠按世室與重屋兮制上圓而下方皇帝名以崑崙兮虛四壁而八窗考工記之紀周兮猶古意之是將公玉帶之繪古兮乃浮辭之鋪張粤我宋之拓興兮起百廢而具新迨皇祐之蒐典兮遵明堂而告神即大慶而藏禋兮剖禮義之紛紜分五室以定制兮揆季商而用辛陟祖考以嚴侑兮務尊尊而親親申景鑠以開後兮鞏皇圖而四維儵陽九之中厄兮緬禾黍而含悲洎駐蹕于錢塘兮賴火徳之載燃思陵原之凄涼兮渠湖山之燕安於我皇之仁聖兮心臨淵而履氷灼元姦而逺迹兮闢衆正而通靈陟文考以祈報兮假帝饗以孝思分禮官以執事兮申敬齋以自持先夕宿於太廟兮遂嚴更而警愓儼天仗之夙戒兮戴平幘而平從列虎賁之萬騎兮羅劍㦸之百重燎夾道而燭光兮恍銜璧之焜煌迅羽毛之掃電兮耀游纓之拂天被編廬以帟幕兮迤雌霓之連蜷羣貂璫之疾驟兮奉奔走而侁侁聨鐵駿之鏦鏦兮森鹵簿之鱗鱗崇供御之旉紛兮載黻班而増華整班而盡衢兮皆安徐而不譁展蟬冠之前驅兮導玉輅之巍巍憲越席之榘制兮錯夜光之陸離齊六馬而錫鸞兮駕三辰之旂旂端龍顏而中御兮承玉立而執綏遵皇道而入闉兮詣複門以儲精被法服以眡事兮奏韶夏以迎牲用陶匏以昭儉兮奉灌爵以薦馨陳鼎俎之在列兮羅鼓鐘之在庭皓星月之交輝兮息宇宙之纎塵和神人以交妥兮鑒悽愴與蒿焄嗟潛靈之遄邁兮仰雲漢之昭回􅀈東方之啓曉兮肆閽闔而宏開蔚皇儀之壯觀兮臨麗正之崇臺目中夏之布徳兮普萬姓以覃恩飛金雞而銜赦兮滃拜稽之如雲採童謡之載路兮美積慶之深源願河海而清宴兮荷天子以萬年重曰藏事兮秋禋潛妥兮三靈顧禖韣兮祈祥眇匕鬯兮孰憑聿追考兮在兹曷悠悠兮儲英築室兮肯堂螽斯兮繩繩倘資善兮宏開奠宗祏兮以寧宅哲人兮俾輔垂無疆兮太平遂志賦横浦作繄蒼靈之秉權兮庸付我以識知抱靜朴而冥思兮相在室而勿欺唯曰忠與孝兮一方寸之所囿渠敢自蔽兮隨吾生之鹵莽音姆紛媚道之波流兮滋皇路之晝迷志茍不卓兮守隨以隳繇混身於圜海兮等菁莪之茂育與相國為始終兮忍見危而弗告固知言則賈禍兮森溪弩之射影奈藴此孤狷兮若嫠婦不恤緯之耿耿顧稟姿其鈍懦兮惴惴焉挈瓶之守叫閶闔以排雲兮曷其不效乎殿馬之後誓圖報於宗社兮雖節解其靡悔矧從諫如轉圜兮可誘以拒而自外首瀝辭於淳亥之閏朔兮指御史垓之貫盈復籲忱于寳寅之禋霽兮諫疑謁於孤山之黄庭幸天王咸嘉納兮徳汗簡而流馨奈邪枿之仇視兮唯恐無罅之可乗乃參㑹乎丙辰絫三學之多言遂萋斐以成錦兮熾黨禍之株連赫赫威焰兮裂石洶洶怒濤兮拍天我思羲虞以抵漢唐兮胎理亂以多塗貫萬古而不與上下兮唯貞之不可誣彼雲氣出沒於太虛兮凡變態之故也炳日月星漢之垂象兮正自莫掩其素也仰吾皇如堯舜兮謗有木而諫有鼓且施磬設鞀以來箴兮肩夏禹而軼周武有君如此兮臣敢負奈譽阿毁墨兮日駕言以激雷霆之怒此賈誼之謇直兮不免於謫長沙靈均之抗憤兮不得不沈汨羅夢彭咸兮情靡他問詹尹兮卜若何倚正信以為杖兮歴﨑嶇返虛白以内鏡兮燭危疑攀太華而整纓兮日未晞擥芳草而酣睡兮安其棲盼白雲兮不可知杳黄耳兮音遲遲逺莫逺于倚門兮孰慰所思樂莫樂于膝下兮寧辭于癡師元城之制欲兮惟煙霧是禦仰無垢之苦心兮媿雙趺之不吾趾挹濓溪之函丈兮㑹宇宙之春意曷以遂志兮藜藿味梅花賦覽賦形於宇内兮粲羣植之敷紛何衆先而獨後兮曰此花其有聞均受氣以立命兮本萬古之一春不競時以媚俗兮故寧歴落乎歳寒繇混沌之鑿開兮凡造化之幾新持狷介以為守兮曽坎壈之為屯夫豈不能效成蹊之無言兮與紅葉以相奢而固栖栖於寂寞之鄉兮如旅人莫知其所家緬藐姑之雅潔兮映白璧其奚瑕蹇偓佺之蕭散兮跨蒼虬之在阿非凡心之内賊兮則嫉口之外魔擯庾嶺以俾艾兮戀孤山以興嗟顧冥霧之漫漫兮覬皎日之昭昭遇傅築之愛其實兮以商羮而見招歎湘纍以節終兮何獨不盻我以離騷班孤竹之二子兮臭味與之而相投笑商山之四老兮乃眷眷於木奴之遭遜僻於嗜兮匪吳匪敖逋工於詠兮南北之峯與髙惟窮而固兮達亦如之以煖而耀兮遇寒已披蘭不為無人而不芳兮誠不慍于不知彼荃之化為茅兮已矣乎其焉悲抱道而獨兮歴變勿疑付榮枯於天分兮孰速孰遲信凌氷厲雪兮真吾規感時賦居寳界作時年四十有三余受衷於元造兮視前哲而莫追年冉冉以告去兮媿蝗粟而増悲顏青春而逝兮全歳之時跖華顛而袤兮有靦嬰兒顧陽背而隂腹兮詎佚我以軀務則古以矩今兮信或者其庶幾世具聖而嫉賢兮於擯棄而則宜隘八極於一牖兮盼同胞其可危智藏於拙兮鑒刳腸之龜斂華就質兮悟耀美之犧入此室處兮明月照裾出以觀山兮清風相期任是非之倒植兮暗室勿欺縱軒輊之乗承兮莫之與隨探彖象於酬酢兮試風雅兮舒徐思無邪而徳有鄰兮亘宇宙而奚疑勢合則聚兮氣散則離物有澌盡兮理無際涯騖餘生於莫知底止兮亦秪以疲玩深趣於欲罷不能兮誰實使之時不可以再得毋待暮兮西嵫操横浦操山峩兮水泚地鱗鱗兮嶺之阯睠林木兮多焦盼美人兮曷處矩古兮礙今行植兮毁深豈不能喑喑兮與時浮沈奈抱此蹇蹇兮若膏肓其不可鍼横浦兮幽絶梅貞兮蘭潔蜂蝶逺兮一氣冽烈宇宙皎兮明月贊諸葛武侯贊卧南陽吟梁父不吳不魏事先主開誠布公集思廣益而經綸如是唯有所不為而後可大有為宜出師一表與伊訓相表裏魚腹沙磧廟前古柏誠斯形形斯著四先生像贊晦菴朱文公天振斯文紫陽木鐸博詳反約是繼絶學日月昭炳揭之以行閒居野服身屈道亨南軒張宣公玉質金相卓爾良貴有鑑在心明利與義大原斯闡維世之模表裏不貳皇皇聖途東萊呂成公探微極深經緯萬象不顯其傑沈潛直養體立同著惟和且平甘雨潤澤古井淵渟象山陸文安公卓學邁倫居超徑詣觀我靈龜以燭來世展矣君子克廣厥居澄然自得春風詠歸銘硯銘斯石曰端表裏潤溫羣居與游孰識所存闇然弗耀主靜力到以則我躬胡不慥慥鏡銘不偏不黨一照萬古予乃禍心而枯槁是怒曷其不内觀兮瑩徹太虛之府墓誌銘故友林道初察推墓誌銘儒有以義為質以學為藩置此身於規矩中而不獲竟其用於世是必有囿於教者非天意也公諱公一姓林氏字道初始祖自閩徙居温之樂成曽祖世定祖守謙父標從温之陳先生游潛心篤行以儒聞於鄉公其長子也方髫丱時已儼若成人不妄言笑不輕交友好讀書經傳子史歴覽精研與意㑹輒筆之凡有闗于脩齊平治之大者寤寐不㤀鄉達諸老每見器敬謂他日能以文行自植必子也年二十一與計偕試南宫不第益肆其力於學端靜介特得伊洛考亭旨趣最深伸紙論事動數千言大較如行雲流水而畢根諸理開慶己未登進士第廷對有奇偉氣本裒然魁天下㑹奸相丁大全黨其私易置第二當時謡語云惟有林公一箇公廷紳抗疏嘗援及之初授文林郎興國軍判官時北兵瞰江勢洶洶公歎曰小人之召外患如此哉吾方筮仕不幸道梗不得同王事塊坐山林於時奚補改授信州察推官郡號多訟郡侯亷公明確事無大小悉以委公公則兩造在庭折以片言輒得其平而去雖氣力者持之不為回撓食少事多志于及物雖疲瘠不憚臺紳應詔交薦如端明陳公昉司業翁公合正言倪公普具以公行義政事奏之君衡文鄱陽得名士居多學者興起願受業戸外屨滿公不能拒也留鄱陽垂三載詔除宗學諭遽以疾終于官囊無一錢衣衾亦不具郡侯寺丞馮公夢得哀之捐俸以給同寮及鄉寓公郡士友皆相率致賻且合辭請于郡欲與公照第一人恩數祈于朝若軍若民聞公之死巷哭路泣軍人列狀各預借月粮以助公歸櫬之費郡侯異之曰察推何以得此於汝曰狀元不要錢爾遂榜通衢以勵風俗公孝友純實嚴是非邪正之辨自守如處子所至以先正警訓為終身程督嘗澄然默坐脫遇事當質弗明弗措也嗟夫以公之心之學之行天固相之而不以壽何哉是可以數觀矣所謂伯淳無福天下人無福得不於公重有感焉公生於丁丑八月二十一日卒于癸亥十月十六日先娶管氏繼黄氏男二彥登韶翁孫一鞏以丙寅十月乙酉葬于峽門山之南原有録覽十二册論語類五册本朝事實十册雜文詩稿手稿各二十巻姪太學生一龍與其孤致書請銘於國子正字劉某某於公素交也居同鄉學同方銘其敢辭銘曰名絅於實兮行純道為數制兮屯且仁孰謂公嗇兮視後人母昌元郡太夫人解氏墓誌先母諱道寧姓解氏瑞安府樂清人父好古娶王氏解與劉世為婣且鄰先母以慈惠靜勤歸吾父性强記不誦即通吾父樂賓尚義每不靳簮珥以成吾父志與吾舅士龍最友愛謂家貧非所患有子讀書乃興家之本勉吾舅各課子嚴甚弗假辭色黻遂偕舅之子白於庚戌榜補太學以壬戌榜俱繇舎選擢奉常第先母封孺人暨召試館職除正字遷校書郎兼樞密院編脩官遇郊禮封安人壬申試吏部侍郎陞侍讀封太令人甲戌典貢舉試吏部尚書封太淑人先母不妄言笑雖甚喜怒不形于色當黻罹丙辰言禍謫庾嶺曰為臣死忠以直被貶分也及己未理皇下哀痛詔有旨津遣歸其鄉拜膝下泣曰汝毋忘國恩惟識不類流俗故處窮達曽不動其心視黻登言路領制閫陞從槖若固有之每思歸故里謂與隣里骨肉聚首有真樂爵禄過分非吾欲也黻累丐祠歸養先帝諭留愈力不克遂而先母病矣甲戌六月十七日卒于從官宅年八十有四先帝聞而哀之特贈銀絹三百疋兩宰執侍從以至學校之士俱遣奠酹奉轝東歸行道之人靡不嘆嗟以明年正月二十五日丁酉權殯于寳林新墳之左新墳先母壽穴也以塚法未利改卜尚有待男三人長黻朝請郎試吏部尚書兼工部尚書兼中書舎人兼脩玉牒官兼侍讀樂清縣開國男食邑三百戸次應奎承奉郎監髙郵軍富安廣儲倉兼淮南東路安撫大使司準遣繼叔寳章閣待制新知福州兼福建路安撫使良貴後少璧國子進士女適進士陳繼之男孫洙源承奉郎女孫芽女許適承奉郎新監福州闕鎮兼鹽倉戴仝壽次招弟引弟得弟涯女黻未克裒次行實求當代銘筆以垂不朽謹摭世系歴封大槩泣血百拜書而納諸坎從姑劉氏墓誌樂成之東有蘇奥劉氏墓余從姑所營以歸其祖父者也山融水紆抔土巋存雖非馬鬛封之謂然孝義所積將草木有徳色從姑生而終鮮備歴間闗凡兩適鄉之士曰張曰林俱蚤死乏嗣皆命為之後者曽莫克負荷所生僅一女擇配而妻進士鄭珍每自慰曰吾數奇纔賴此爾從姑聰慧敏莊篤孝篤義家屢空能以苦約自殖惟念祖父久在殯所畟不忘或與言則涕泫然謂有親未葬有生猶無生得卜蘇奥之原仍先隴也鬻簮珥觸寒暑必誠必信獲遂終事里之人咸異義之春濡秋凜松柏鬱鬱世之為男子者眂其親之未得所藏鮮衣媺食恬不加之意其於吾從姑之識何相去萬萬哉從姑喜茹蔬嗜佛好脩年六十有三不幸亡矣人莫不以伯道無兒哀之乃有壻敦親親之義不憚勞勩而以吾從姑祔祖父之塋且治田以相蓮社合劉氏祖父墓祠焉嗟夫孝天性也亦人道也一性之感往者樹來者芽余既多從姑之性之道又多鄭君夫婦能于所性而加厚之劉氏自今以道義著矣是陶風俗之一機也以咸淳六年閏月二十五日辛酉卜窆曽祖安仁祖大年父康民余與從姑同曽祖云姪奉議郎除集英殿脩撰知慶元府主管沿海制置使司公事某誌䝉川遺稿巻四
