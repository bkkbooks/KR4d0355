front:
  text: 欽定四庫全書集部四
  hash: sha256:feea65c2c5f7b24c3923896ddfefeaca5f2adb12a64602844adb735e91a1782a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0355_WYG_000-1a, image: WYG1182/WYG1182-0639a.png}
body:
  text: 䝉川遺稿别集類三宋提要臣等謹案䝉川遺稿四卷宋劉黻撰黻字升伯號質翁樂清人淳祐初以試入太學伏闕上書攻丁大全送南安軍安置大全敗後召還廷試又以對策忤賈似道復為所抑後由昭慶軍節度掌書記除學官擢御史纍官至吏部尚書遭母喪解官遂不復起㑹宋亡二王航海黻追從入廣至羅浮而卒諡忠肅所著有諫坡奏牘薇垣制藁經帷納獻諸書航海時挾以自隨遂散落不存此詩文殘藁四卷乃其弟應奎所裒集也黻危言徑氣屢觸權姦當國家板蕩之時瑣尾相從流離海上卒之抱節以死忠義之氣已足不朽其詩亦淳古淡泊多規橅陳子昻體雖限於風㑹格律未純而人品既髙神思自别下視方回諸人如鳯皇之翔千仭矣惟傳抄既久文多訛脫更無别本可校為足惜耳卷首有應奎序作於元大德中又有鄭滁孫朝陽閣記一篇朝陽閣者黻山中讀書之地黻沒以後舊宅盡燬惟是閣尚存故應奎請滁孫為之記云乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀蒙川遺稿原序先伯氏蒙川先生少有志操刻勵清苦以成其學而惟孝惟忠雖流離顛沛中亦未嘗忘於言其立身大節雖沒齒無愧怍也生無他嗜好惟殫精畢思於文字間凡所著述與諫坡奏牘薇垣制藁經帷納獻若干卷悉以自隨今皆散落不復見矣可哀也若夫廬室為燬幸而讀書之朝陽閣巋然於蒼松翠竹間亦天也耶喜而為謁記求當代之鴻師碩儒晨星稀矣惟息堂先生鄭公又赴蒲輪之召應奎遂有請焉乃蒙念同年之舊思獻納之暇托其實而著之炳如也然每追念先生不無遺憾於撰述之僅有存者或得之斷簡殘篇或得之朋友記識若詩若文裒聚止四卷為蒙川先生遺稿以應奎之年已衰朝露行晞何能廣索冥搜姑鋟諸梓以示子若孫而朝陽閣記雖已刻於閣之楣矣今并入卷之首夫文載道者也文雖不能盡得茍能僅存則道亦與之俱存庶乎不與龍門草木俱腐焉爾大德歲上元日弟應奎謹序朝陽閣記東甌背江以城環斗而治江北東巒嶂峭巁狀若挂綵望之輒動人乘桴之興循是舟行數十里睇海門為近遂東入河為樂清邑境又數十里至其邑勢則負山面海亦奇觀也於是陸行東越芳林將入雁蕩有聚落日郭路父老云晉郭景純奠甌治時所經而盤桓也其地曠且奧自台山萬八千丈來下屹為雁蕩諸峰奇崛異狀至是始蟬蛻鳯翥鍾育人物焉凡由是騰躍而西賓揖孤嶼外異嫵媚而雄健博大者皆其物也山隂為梅溪王公宅其陽於闕定丁丑遂生劉公黻兩公相照映天降時雨山川出雲不虛也哉公少字升伯早聞於人二十餘年讀書僧坊嗜陳子昂吟哦髙視物表蕩中有峰曰朝陽清潤而特立梧桐生之晚作室以名讀書之閣公之志其在黃虞與文王之時乎左麓有泉汩汩之海弟子尊事公曰蒙川先生公生二十四年試入太學儕輩已翕然韙有司得賢後月書暇日授學蘇湖閒丁大全方為臺屬移牒迫逐宰相去國將奪其位同舍生以公嘗言大全署公為首伏闕言失體貌大臣禮書上追送南安軍安置大全貶公還公之赴南安也曰吾誠言既還太學也曰吾誠未嘗言舍法入優等歲壬戌廷策莫不期公必冠多士賈似道専國貪天欲網羅公以自詭懇懇明道不計功之對遂失髙選當唱第雨暴如注隂霾激射庭中不相覩太史占者失人色公之不當此不祥有以哉其後公由昭慶軍節度使掌書記除學官試館職擢御史遷諫省常與是科亞魁接武權臣能絀公於一時終不能抑公於他日中孚之信淇澳之盛德威儀蓋自有以得之丁宫師公諱允懷艱服闋除集英殿修撰開闕海閫為賢牧伯召還由刑部侍郎中書舍人吏部尚書丁太夫人解氏艱明年江闕師亞魁繼相起復公端明殿學士視儀執政倚公闕子海邦以臨之公不為起未幾似道洎軍帥韓震皆殛死卒用其謀擁二王由桐鄉入海以兵逆公共政將遜相位印公不復省成敗利鈍托宗祀于母弟成伯遂起既起則覺田橫棲海之謀信莊生辭楚之志及羅浮以疾薨公薨其配林夫人舉室蹈海公一家就義而海上瓦解矣平時有為許負之術者曰公當以憂死不幸其言而中成伯居城中既附攜後公之二子歸尋故里十室九墟慨公所營朝陽閣巋然獨存屬同年進士鄭滁孫記之傷哉公之為志也公其逝矣南山其矸白石為爛存者奚獨此庋哉閣也鴟梟晦鳴鼪鼯夜嘯不足以為妖也隂風曀曀疾雷虺虺不足以為虐也旦日東出清光一瞬歷危䦨而滿上床宜見公之顔色也哉至是公薨三十餘年矣伯夷之清周民猶得稱之遂為之記而繫以辭成伯仕宋嘗佐九卿既附以推擇尹為邑鄉遂隱田間文學行誼肖其昆辭曰西伯寂寞鳯悠悠瑞圖不下十二樓先生有道垂鴻猷殆今已矣如東流髙卧百尺昔所闕深夜書聲闕復闕山下出泉分龍湫日旭泉新清悲幽酌兹朝薦神來遊逝去混混歎川流歌此聊釋風雨憂詵詵興仁化魯鄒
